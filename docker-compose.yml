version: '3.8'

services:
  # Banco de Dados PostgreSQL 16 Alpine com persistência
  postgres:
    image: postgres:16-alpine
    container_name: deliveryboy_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-antigravity_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-antigravity_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Serviço Backend API NestJS
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: deliveryboy_api
    restart: always
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-antigravity_db}?schema=public
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
