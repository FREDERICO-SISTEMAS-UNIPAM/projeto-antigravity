lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    dependencies:
      prettier:
        specifier: ^3.2.5
        version: 3.2.5
      turbo:
        specifier: ^2.0.0
        version: 2.0.0
      typescript:
        specifier: ^5.4.5
        version: 5.4.5

  apps/api:
    dependencies:
      '@google/genai':
        specifier: ^2.12.0
        version: 2.12.0

  apps/mobile:
    dependencies:
      react:
        specifier: 18.2.0
        version: 18.2.0

  apps/web:
    dependencies:
      react:
        specifier: ^18.3.1
        version: 18.3.1
      react-dom:
        specifier: ^18.3.1
        version: 18.3.1
      vite:
        specifier: ^5.2.11
        version: 5.2.11
